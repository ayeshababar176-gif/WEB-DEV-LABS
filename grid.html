<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid</title>
     <style>
        .container{
            background-color: green;
            display: grid;
            /* grid-template-columns: 1fr 1fr 1fr; */
             grid-template-columns: repeat(3, 1fr);
            grid-template-rows:300px 250px auto ;
            grid-gap:20px;
        }
        .items{
            border: 2px solid black;
            border-radius: 3px;
        }
        .items:first-child{
            grid-row: span 3;
        }

        .item1{
            background-color: bisque;
        }

        .item2{
            background-color: palevioletred;
        }

        .item3{
            background-color: yellow;
        }
        .item4{
            background-color: blue;
        }
        .item5{
            background-color: blueviolet;
        }
        .item6{
            background-color: powderblue;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="items item1">Box1</div>
        <div class="items item2">Box2</div>
        <div class="items item3">Box3</div>
        <div class="items item4">Box4</div>
        <div class="items item5">Box25</div>
        <div class="items item6">Box6</div>
    </div>
    
</body>
</html>
