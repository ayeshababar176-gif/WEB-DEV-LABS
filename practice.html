<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color:green;
            display: grid;
            grid-template-columns:repeat(3,1fr);
            grid-template-rows: 300px 250px auto;
            grid-gap: 40px;
            
        }
        .items.item1{
            background-color: grey;
            width: 100%;
            grid-row: 1/ span 2;
            font-size: 20px;
        }
        .items.item2{
            background-color: pink;
            width: 100%;
            font-size: 20px;
        }
       .items.item3{
            background-color: #0000ff;
            width: 100%;
            font-size: 20px;
       }
       .items.item4{
            background-color: #ffff00;
            width: 100%;
            font-size: 20px;
       }
       .items.item5 img{
            width: 100px;
            height: 100px;
       }
    </style>


</head>
<body>
    <div class="container">
        <div class="items item1"><p>this is a first item</p></div>
        <div class="items item2"><p>this is item 2</p></div>
        <div class="items item3"><p>this is item 3</p></div>
        <div class="items item4"><p>this is item 4</p></div>
        <div class="items item5"><img src="images/christmas-decoration.png" alt="logo"></div>
    </div>
